<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tetris Slim 2026</title>
    <style>
        :root { --main-bg: #121212; --accent: #00f0f0; --btn-bg: #2a2a2a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--main-bg); color: #fff; font-family: -apple-system, sans-serif;
            margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 100vh; overflow: hidden; touch-action: none;
        }
        
        /* 상단 점수판 - 더 슬림하게 */
        #header { width: 100%; max-width: 300px; display: flex; justify-content: space-around; padding: 10px 0; }
        .stat-box { text-align: center; }
        .label { font-size: 9px; color: #666; letter-spacing: 0.5px; }
        .value { font-size: 18px; font-weight: 600; color: var(--accent); }

        /* 게임 컨테이너 - 세로 길이를 늘림 */
        #game-container { 
            position: relative; width: 85%; max-width: 280px;
            border: 1px solid #333; background: #000; border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8); overflow: hidden;
            flex-grow: 1; margin: 5px 0;
        }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        /* 시작 버튼 오버레이 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        #start-btn {
            background: var(--accent); color: #000; border: none; padding: 12px 30px;
            font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer;
        }

        /* 하단 컨트롤러 - 작고 예쁘게 재배치 */
        #controls { 
            width: 100%; max-width: 320px; padding: 10px 20px 20px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
        }
        .btn {
            background: var(--btn-bg); border: none; border-radius: 12px;
            color: white; font-size: 20px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .btn:active { background: #444; transform: scale(0.92); }
        .btn-rotate { background: #3a3a3a; }
        .btn-hard { grid-column: span 4; height: 40px; font-size: 13px; color: #888; background: transparent; border: 1px solid #333; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-box"><div class="label">SCORE</div><div id="score" class="value">0</div></div>
        <div class="stat-box"><div class="label">LEVEL</div><div id="level" class="value">1</div></div>
    </div>

    <div id="game-container">
        <canvas id="tetris"></canvas>
        <div id="overlay">
            <button id="start-btn" onclick="startGame()">START</button>
        </div>
    </div>

    <div id="controls">
        <button class="btn btn-left" onclick="playerMove(-1)">←</button>
        <button class="btn btn-rotate" onclick="playerRotate(1)">↻</button>
        <button class="btn btn-right" onclick="playerMove(1)">→</button>
        <button class="btn btn-drop" onclick="playerDrop()">↓</button>
        <button class="btn btn-hard" onclick="hardDrop()">HARD DROP</button>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const overlay = document.getElementById('overlay');

        // 게임판 크기 (가로 10, 세로 22로 대폭 늘림)
        const ARENA_WIDTH = 10;
        const ARENA_HEIGHT = 22;
        
        function resizeCanvas() {
            const containerWidth = canvas.parentElement.clientWidth;
            const containerHeight = canvas.parentElement.clientHeight;
            const blockSize = Math.min(containerWidth / ARENA_WIDTH, containerHeight / ARENA_HEIGHT);
            
            canvas.width = blockSize * ARENA_WIDTH;
            canvas.height = blockSize * ARENA_HEIGHT;
            context.scale(blockSize, blockSize);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        const colors = [null, '#00f0f0', '#f0a000', '#0000f0', '#f0f000', '#f00000', '#00f000', '#a000f0'];

        let arena = createArena(ARENA_WIDTH, ARENA_HEIGHT);
        let player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
        let gameRunning = false;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function startGame() {
            overlay.style.display = 'none';
            gameRunning = true;
            if (!loadGame()) playerReset();
            update();
        }

        function saveGame() {
            localStorage.setItem('tetris_v3_save', JSON.stringify({ arena, player }));
        }

        function loadGame() {
            const data = localStorage.getItem('tetris_v3_save');
            if (data) {
                const saved = JSON.parse(data);
                if (saved.arena.length !== ARENA_HEIGHT) return false;
                arena = saved.arena;
                Object.assign(player, saved.player);
                updateScore();
                return true;
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
            saveGame();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function createArena(w, h) {
            return Array.from({length: h}, () => new Array(w).fill(0));
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
            saveGame();
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            dir > 0 ? matrix.forEach(row => row.reverse()) : matrix.reverse();
        }

        function playerDrop() {
            if (!gameRunning) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
            saveGame();
        }

        function hardDrop() {
            if (!gameRunning) return;
            while(!collide(arena, player)) player.pos.y++;
            player.pos.y--;
            playerDrop();
        }

        function playerMove(dir) {
            if (!gameRunning) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
            saveGame();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
                gameRunning = false;
                overlay.style.display = 'flex';
                document.getElementById('start-btn').innerText = 'RESTART';
                localStorage.removeItem('tetris_v3_save');
            }
        }

        function playerRotate(dir) {
            if (!gameRunning) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            saveGame();
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            if (player.matrix) drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'rgba(0,0,0,0.3)';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function update(time = 0) {
            if (!gameRunning) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            levelElement.innerText = Math.floor(player.score / 100) + 1;
            dropInterval = Math.max(100, 1000 - (Math.floor(player.score / 100) * 100));
        }

        draw();
    </script>
</body>
</html>
