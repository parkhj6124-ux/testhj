<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Tetris 2026</title>
    <style>
        :root { --main-bg: #1a1a1a; --accent: #00f0f0; }
        body { 
            background: var(--main-bg); color: #fff; font-family: sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        #game-container { 
            position: relative; margin-top: 10px; 
            border: 2px solid #444; background: #000;
        }
        canvas { display: block; }
        
        /* 상단 정보 창 */
        #header { width: 240px; display: flex; justify-content: space-between; padding: 10px 0; }
        .stat-box { text-align: center; }
        .label { font-size: 10px; color: #888; }
        .value { font-size: 18px; font-weight: bold; color: var(--accent); }

        /* 모바일 컨트롤러 */
        #controls { 
            margin-top: auto; margin-bottom: 30px;
            display: grid; grid-template-columns: repeat(3, 70px); 
            grid-template-rows: repeat(2, 70px); gap: 10px;
        }
        .btn {
            background: #333; border: none; border-radius: 10px;
            color: white; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #555; transform: scale(0.95); }
        .btn-wide { grid-column: span 3; height: 50px; margin-top: 5px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-box"><div class="label">SCORE</div><div id="score" class="value">0</div></div>
        <div class="stat-box"><div class="label">LEVEL</div><div id="level" class="value">1</div></div>
    </div>

    <div id="game-container">
        <canvas id="tetris" width="240" height="480"></canvas>
    </div>

    <div id="controls">
        <div class="btn" onclick="playerRotate(1)">↻</div>
        <div class="btn" onclick="playerMove(-1)">←</div>
        <div class="btn" onclick="playerMove(1)">→</div>
        <div class="btn" style="grid-column: 2;" onclick="playerDrop()">↓</div>
        <button class="btn btn-wide" onclick="hardDrop()">HARD DROP</button>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');

        context.scale(24, 24);

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        const colors = [null, '#00f0f0', '#f0a000', '#0000f0', '#f0f000', '#f00000', '#00f000', '#a000f0'];

        // --- 저장 및 불러오기 ---
        function saveGame() {
            localStorage.setItem('tetris_save_2026', JSON.stringify({ arena, player }));
        }

        function loadGame() {
            const data = localStorage.getItem('tetris_save_2026');
            if (data) {
                const saved = JSON.parse(data);
                saved.arena.forEach((row, y) => row.forEach((val, x) => arena[y][x] = val));
                Object.assign(player, saved.player);
                updateScore();
                return true;
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
            saveGame();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function createArena(w, h) {
            return Array.from({length: h}, () => new Array(w).fill(0));
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
            saveGame();
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            dir > 0 ? matrix.forEach(row => row.reverse()) : matrix.reverse();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
            saveGame();
        }

        function hardDrop() {
            while(!collide(arena, player)) player.pos.y++;
            player.pos.y--;
            playerDrop();
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
            saveGame();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
                localStorage.removeItem('tetris_save_2026');
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            saveGame();
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = '#000';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.
